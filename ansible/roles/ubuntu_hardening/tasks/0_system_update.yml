---
# =============================================================================
# SYSTEM PREP | STEP 0 - OS Update & Core Packages Installation
# =============================================================================

- name: "PREP | 0.1 - Update apt cache and upgrade all system packages"
  ansible.builtin.apt:
    update_cache: yes
    upgrade: dist
    cache_valid_time: 3600 # Skip update if cache was refreshed within the last 1 hour (saves time)
  when: run_heavy_updates | default(true) | bool
  tags: [system_upgrade]

- name: "PREP | 0.2 - Install essential dependencies for Docker & Utilities"
  ansible.builtin.apt:
    name:
      - curl
      - ca-certificates
      - gnupg
      - lsb-release
      - software-properties-common
      - ufw
      - tar
      - rsync
    state: present
    update_cache: yes
  tags: [system_packages]

- name: "PREP | 0.3 - Clean up leftover and unused packages"
  ansible.builtin.apt:
    autoclean: yes
    autoremove: yes
  tags: [system_cleanup]